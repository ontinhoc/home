    <script>
        const questions = [
            {
                question: "Chức năng chính của hub là gì?",
                options: [
                    "Định tuyến dữ liệu giữa các mạng.",
                    "Phát tán tín hiệu từ một cổng ra tất cả các cổng khác.",
                    "Chuyển đổi tín hiệu số sang tín hiệu tương tự.",
                    "Kết nối các thiết bị di động bằng sóng vô tuyến."
                ],
                answer: 1,
                explanation: "Hub phát tín hiệu từ một cổng ra tất cả các cổng khác."
            },
            {
                question: "Thiết bị nào giúp giảm hiện tượng xung đột tín hiệu trong LAN so với hub?",
                options: ["Switch","Modem","Router","WAP"],
                answer: 0,
                explanation: "Switch chỉ truyền đúng cổng cần thiết giúp giảm xung đột."
            },
            {
                question: "Wireless Access Point (WAP) có chức năng chính là gì?",
                options: ["Định tuyến dữ liệu giữa các LAN.","Kết nối thiết bị đầu cuối qua sóng Wi-Fi.","Chuyển đổi tín hiệu số ↔ tương tự.","Phát tán tín hiệu ra tất cả các cổng."],
                answer: 1,
                explanation: "WAP kết nối thiết bị qua sóng Wi-Fi."
            },
            {
                question: "Thiết bị nào được dùng để kết nối mạng LAN với Internet và thực hiện chọn đường đi cho gói tin?",
                options: ["Hub","Switch","Router","WAP"],
                answer: 2,
                explanation: "Router định tuyến dữ liệu giữa các mạng và kết nối Internet."
            },
            {
                question: "Chức năng chính của modem là gì?",
                options: ["Chuyển tín hiệu số thành tín hiệu tương tự và ngược lại.","Chọn đường truyền tối ưu cho gói tin.","Giảm xung đột trong mạng LAN.","Tạo ra điểm truy cập Wi-Fi."],
                answer: 0,
                explanation: "Modem chuyển đổi tín hiệu số ↔ tương tự để kết nối Internet."
            },
            {
                question: "Khi nào nên dùng hub thay cho switch?",
                options: ["Khi muốn giảm xung đột tín hiệu.","Khi cần tiết kiệm chi phí trong mạng nhỏ.","Khi kết nối các mạng LAN với nhau.","Khi cần phát Wi-Fi."],
                answer: 1,
                explanation: "Hub rẻ hơn, phù hợp cho mạng nhỏ với ít máy."
            },
            {
                question: "Để máy tính để bàn kết nối được Wi-Fi, cần:",
                options: ["Dùng dây cáp mạng RJ45.","Lắp thêm card/mạch mở rộng hỗ trợ Wi-Fi.","Dùng modem quang.","Cắm trực tiếp vào switch."],
                answer: 1,
                explanation: "Máy tính để bàn cần card hoặc mạch mở rộng để hỗ trợ Wi-Fi."
            },
            {
                question: "Loại modem nào thường được dùng để kết nối Internet qua đường dây điện thoại nhưng tách biệt với thoại?",
                options: ["Modem quay số","Modem ADSL","Modem quang","Modem 3G/4G"],
                answer: 1,
                explanation: "Modem ADSL dùng đường dây điện thoại nhưng tách biệt với thoại."
            },
            {
                question: "Trong sơ đồ mạng gia đình hiện nay, thiết bị thường tích hợp router + modem + Wi-Fi trong cùng một hộp gọi là:",
                options: ["Hub đa năng","Switch Wi-Fi","Router Wi-Fi","Modem quay số"],
                answer: 2,
                explanation: "Router Wi-Fi thường tích hợp router, modem và Wi-Fi trong một thiết bị."
            },
            {
                question: "Ưu điểm của kết nối không dây (Wi-Fi) so với kết nối có dây là gì?",
                options: ["Tốc độ luôn cao hơn.","Không cần nhập mật khẩu.","Thuận tiện, di động, không phải kéo dây mạng.","Không bao giờ bị nhiễu tín hiệu."],
                answer: 2,
                explanation: "Wi-Fi thuận tiện và di động, không cần kéo dây mạng."
            }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            initializeQuiz(questions);
        });
    </script>
    <script>
        // Simple client-side password protection (not secure for sensitive content)
        (function(){
            const LOCK_KEY = 'tin12_bai3_unlocked';
            const password = 'giaovien'; // change this if needed
            const lockScreen = document.getElementById('lockScreen');
            const content = document.getElementById('content');
            const unlockBtn = document.getElementById('unlockBtn');
            const cancelBtn = document.getElementById('cancelUnlock');
            const input = document.getElementById('pagePassword');
            const lockMsg = document.getElementById('lockMsg');

            function unlock() {
                const val = input.value || '';
                if (val === password) {
                    sessionStorage.setItem(LOCK_KEY, '1');
                    lockScreen.style.display = 'none';
                    content.style.display = 'block';
                    lockMsg.style.display = 'none';
                } else {
                    lockMsg.style.display = 'block';
                }
            }

            unlockBtn.addEventListener('click', unlock);
            cancelBtn.addEventListener('click', () => { input.value = ''; lockMsg.style.display = 'none'; });
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') unlock(); });

            // If already unlocked in this session, show content
            if (sessionStorage.getItem(LOCK_KEY) === '1') {
                lockScreen.style.display = 'none';
                content.style.display = 'block';
            }
        })();
    </script>
